<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta
    http-equiv="Content-Security-Policy"
    content="default-src 'self'; style-src 'self'; img-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'"
  >
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta
    name="description"
    content="Pluviometrics is a rainfall intelligence platform for atmospheric, stormwater, and legacy rainfall analysis tools."
  >
  <title>Pluviometrics</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page-shell">
    <header class="site-header" aria-labelledby="page-title">
      <img
        class="site-header__logo"
        src="Assets/Logos/PLUVIOMETRICS.png"
        alt="Pluviometrics"
        width="520"
        height="160"
      >
      <div class="site-header__text">
        <h1 id="page-title">Pluviometrics</h1>
        <p>Rainfall intelligence platform</p>
      </div>
    </header>

    <section class="product-grid" aria-label="Pluviometrics products">
      <a class="product-card" href="https://atmos.pluviometrics.com.au">
        <img
          class="product-card__logo"
          src="Assets/Logos/ATMOS.png"
          alt="Atmos"
          width="360"
          height="180"
        >
        <div class="product-card__body">
          <h2>Atmos</h2>
          <p>Nowcasting and atmospheric analysis</p>
        </div>
        <span class="product-card__action">Open Atmos</span>
      </a>

      <a class="product-card" href="https://stormgauge.pluviometrics.com.au">
        <img
          class="product-card__logo"
          src="Assets/Logos/STORMGAUGE.png"
          alt="Stormgauge"
          width="360"
          height="180"
        >
        <div class="product-card__body">
          <h2>Stormgauge</h2>
          <p>Stormwater rainfall analysis tool</p>
        </div>
        <span class="product-card__action">Open Stormgauge</span>
      </a>

      <a class="product-card" href="https://nbc.pluviometrics.com.au/?v=20260429-home">
        <img
          class="product-card__logo"
          src="Assets/Logos/PLUVIOMETRICS.png"
          alt="NBC legacy"
          width="360"
          height="180"
        >
        <div class="product-card__body">
          <h2>NBC <span>(legacy)</span></h2>
          <p>Legacy rainfall calculator and tools</p>
        </div>
        <span class="product-card__action">Open NBC</span>
      </a>
    </section>
  </main>
</body>
</html>
